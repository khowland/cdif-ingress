# ==============================================================================
# @file nginx.conf
# @description Minimal Nginx configuration to serve the frontend via Google Cloud Run.
# Google Cloud Run expects the container to listen on the PORT env variable (usually 8080).
# ==============================================================================

server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
